<script>

/* ===================== */
/* コメント */
/* ===================== */

// 一行コメント

/*
複数行コメント
*/


/* ===================== */
/* 変数 */
/* ===================== */

let name = "サミ";
/* 後で変更可能 */

const age = 20;
/* 定数 */

var oldStyle = 123;
/* 昔の書き方 */


/* ===================== */
/* 型 */
/* ===================== */

let text = "こんにちは";
/* 文字列 */

let number = 123;
/* 数値 */

let flag = true;
/* 真偽値 */

let nothing = null;
/* 空 */

let undef;
/* 未定義 */


/* ===================== */
/* 配列 */
/* ===================== */

let hobbies = [
    "数学",
    "読書",
    "プログラミング"
];

console.log(hobbies[0]);


/* ===================== */
/* オブジェクト */
/* ===================== */

let user = {

    name: "サミ",

    age: 20

};

console.log(user.name);


/* ===================== */
/* 四則演算 */
/* ===================== */

let a = 10;
let b = 3;

console.log(a + b);
console.log(a - b);
console.log(a * b);
console.log(a / b);


/* ===================== */
/* 比較 */
/* ===================== */

console.log(a > b);

console.log(a === b);

console.log(a !== b);


/* ===================== */
/* if */
/* ===================== */

if (a > b) {

    console.log("大きい");

} else {

    console.log("小さい");

}


/* ===================== */
/* for */
/* ===================== */

for(let i = 0; i < 5; i++) {

    console.log(i);

}


/* ===================== */
/* while */
/* ===================== */

let count = 0;

while(count < 5) {

    count++;

}


/* ===================== */
/* 関数 */
/* ===================== */

function add(x, y) {

    return x + y;

}

console.log(add(3,4));


/* ===================== */
/* アロー関数 */
/* ===================== */

const square = (x) => {

    return x * x;

};


/* ===================== */
/* イベント */
/* ===================== */

function hello() {

    alert("こんにちは");

}


/* ===================== */
/* HTML取得 */
/* ===================== */

let title =
document.getElementById("title");


/* ===================== */
/* CSSセレクタ取得 */
/* ===================== */

let button =
document.querySelector(".button");


/* ===================== */
/* 内容変更 */
/* ===================== */

title.textContent =
"変更されたタイトル";


/* ===================== */
/* HTML追加 */
/* ===================== */

document.body.innerHTML +=
"<p>追加された文章</p>";


/* ===================== */
/* CSS変更 */
/* ===================== */

title.style.color = "red";


/* ===================== */
/* クラス追加 */
/* ===================== */

title.classList.add("active");


/* ===================== */
/* 要素生成 */
/* ===================== */

let p =
document.createElement("p");

p.textContent =
"新しい段落";

document.body.appendChild(p);


/* ===================== */
/* イベント登録 */
/* ===================== */

button.addEventListener(
    "click",
    hello
);


/* ===================== */
/* タイマー */
/* ===================== */

setTimeout(() => {

    console.log("3秒後");

}, 3000);


/* ===================== */
/* 繰り返しタイマー */
/* ===================== */

setInterval(() => {

    console.log("毎秒");

}, 1000);


/* ===================== */
/* 非同期通信 */
/* ===================== */

fetch(
    "https://api.example.com"
)
.then(response =>
    response.json()
)
.then(data => {

    console.log(data);

});


/* ===================== */
/* async await */
/* ===================== */

async function loadData() {

    const response =
        await fetch("/api");

    const data =
        await response.json();

    console.log(data);

}

</script>
